schema_version: 1

# Docs the plugin asks Claude to read at SessionStart.
bootstrap_docs:
  - doc/ARCHITECTURE.md
  - doc/CODE_MAP.md
  - doc/DIRECTORY_TREE.md
  - doc/SPEC.md

# Code -> doc update rules.
rules:
  - id: common-code-map
    pattern: "common/**"
    docs:
      - path: doc/CODE_MAP.md
        section: common
        required: true
      - path: doc/ARCHITECTURE.md
        required_if: architecture_changed

  - id: position-manager
    pattern: "position-manager/**"
    docs:
      - path: doc/CODE_MAP.md
        section: position-manager
        required: true
      - path: position-manager/README.md
        required_if: params_changed

  - id: execution
    pattern: "execution/**"
    docs:
      - path: doc/CODE_MAP.md
        section: execution
        required: true

  - id: risk
    pattern: "risk/**"
    docs:
      - path: doc/CODE_MAP.md
        section: risk
        required: true
      - path: doc/ARCHITECTURE.md
        required_if: architecture_changed

  - id: schema-files
    pattern: "**/schema/*.json"
    docs:
      - path: doc/SPEC.md
        required_if: schema_changed

# Allow Claude to skip doc updates in these contexts (semantic judgement).
skip_conditions:
  - bug_fix_only
  - internal_refactor
  - test_only
  - comment_formatting_only

# How strict to be: silent | warn | block
enforcement: warn

# Sibling-plugin integration (optional).
integration:
  kanban:
    block_done_if_pending: false
  memory:
    summarize_doc_changes: true
